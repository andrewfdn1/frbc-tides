<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRBC RADIO CONTROL</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 30px; }
        
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .btn {
            background: #222;
            border: 2px solid #33FF57;
            color: #33FF57;
            padding: 20px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn:hover { background: #33FF57; color: #000; }
        .btn.active { background: #33FF57; color: #000; box-shadow: 0 0 15px #33FF57; }

        .off-btn {
            border-color: #FF4B4B;
            color: #FF4B4B;
            margin-top: 40px;
            width: 100%;
            max-width: 300px;
        }
        .off-btn:hover { background: #FF4B4B; color: #000; }

        .status { margin-top: 20px; color: #555; font-size: 14px; text-transform: uppercase; }
        
        .nav-link {
            margin-top: 50px;
            color: #33FF57;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #333;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2>RADIO SELECTOR</h2>

    <div class="station-grid">
        {% for name, url in stations.items() %}
            <button class="btn" onclick="playStation('{{ name }}', this)">{{ name }}</button>
        {% endfor %}
    </div>

    <button class="btn off-btn" onclick="stopRadio()">RADIO OFF</button>

    <div class="status" id="status-text">SYSTEM IDLE</div>

    <a href="/" class="nav-link">RETURN TO DASHBOARD</a>

    <script>
        const status = document.getElementById('status-text');

        function playStation(name, btn) {
            // 1. UI Feedback: Highlight selected button
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // 2. Immediate status update
            status.innerText = "COMMANDING PI TO PLAY: " + name;
            status.style.color = "#fff";

            // 3. Request the Flask backend to start VLC hardware playback
            fetch('/play/' + encodeURIComponent(name))
                .then(response => {
                    if (!response.ok) throw new Error("Backend Error");
                    return response.json();
                })
                .then(data => {
                    status.innerText = "PI PLAYING: " + name;
                    status.style.color = "#33FF57";
                })
                .catch(error => {
                    status.innerText = "ERROR: COULD NOT START RADIO";
                    status.style.color = "#FF4B4B";
                });
        }

        function stopRadio() {
            // Request the Flask backend to kill the VLC process
            fetch('/stop')
                .then(() => {
                    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                    status.innerText = "SYSTEM IDLE";
                    status.style.color = "#555";
                })
                .catch(() => {
                    status.innerText = "ERROR STOPPING RADIO";
                });
        }
    </script>
</body>
</html>
